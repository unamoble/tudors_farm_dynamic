<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tudor Farm Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    body { background: #eef2ec; }
    .admin-wrap { width: min(1080px, 92vw); margin: 2rem auto 3rem; }
    .admin-top { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .admin-top h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); }
    .panel { background: #fff; border-radius: 16px; box-shadow: 0 14px 34px rgba(23, 40, 28, 0.14); padding: 1rem; margin-bottom: 1rem; }
    .grid { display: grid; gap: 0.75rem; }
    .grid.two { grid-template-columns: 1fr; }
    label { font-weight: 600; color: #1f2a22; font-size: 0.92rem; }
    input, textarea { width: 100%; border: 1px solid #d5ded3; border-radius: 10px; padding: 0.65rem 0.7rem; font: inherit; }
    textarea { min-height: 90px; resize: vertical; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 0.6rem; }
    .small-btn { border: 0; border-radius: 999px; padding: 0.5rem 0.9rem; font-weight: 700; cursor: pointer; }
    .small-btn.primary { background: #2f6f3e; color: #fff; }
    .small-btn.warn { background: #b6422d; color: #fff; }
    .collection { display: grid; gap: 0.75rem; }
    .item-card { border: 1px solid #dce6db; border-radius: 12px; padding: 0.8rem; background: #f8fbf8; }
    .hide { display: none !important; }
    .status { font-weight: 600; color: #244d2d; min-height: 1.4rem; }
    @media (min-width: 840px) {
      .grid.two { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="admin-wrap">
    <section id="login-panel" class="panel">
      <h1>Tudor Farm Admin</h1>
      <p>Enter admin password to manage rooms, gallery, and site settings.</p>
      <div class="grid" style="max-width: 420px;">
        <div>
          <label for="admin-password">Password</label>
          <input id="admin-password" type="password" autocomplete="current-password" />
        </div>
      </div>
      <div class="actions">
        <button id="login-btn" class="small-btn primary" type="button">Login</button>
      </div>
      <p id="login-status" class="status"></p>
    </section>

    <section id="admin-app" class="hide">
      <div class="admin-top">
        <h1>Content Manager</h1>
        <button id="logout-btn" class="small-btn" type="button">Logout</button>
      </div>

      <section class="panel">
        <h2>Site Config</h2>
        <div class="grid two">
          <div>
            <label for="site-title">Site Title</label>
            <input id="site-title" type="text" />
          </div>
          <div>
            <label for="site-subtitle">Site Subtitle</label>
            <input id="site-subtitle" type="text" />
          </div>
          <div>
            <label for="whatsapp">WhatsApp Number</label>
            <input id="whatsapp" type="text" />
          </div>
          <div>
            <label for="hero-image">Hero Image URL</label>
            <input id="hero-image" type="url" />
          </div>
          <div>
            <label for="map-embed">Google Map Embed URL</label>
            <input id="map-embed" type="url" />
          </div>
        </div>
        <div style="margin-top: 0.75rem;">
          <label for="about-text">About Text</label>
          <textarea id="about-text"></textarea>
        </div>
      </section>

      <section class="panel">
        <h2>Rooms</h2>
        <div id="rooms-list" class="collection"></div>
        <div class="actions">
          <button id="add-room-btn" class="small-btn" type="button">Add Room</button>
          <button id="save-rooms-btn" class="small-btn primary" type="button">Save Rooms</button>
        </div>
      </section>

      <section class="panel">
        <h2>Gallery</h2>
        <div id="gallery-list" class="collection"></div>
        <div class="actions">
          <button id="add-gallery-btn" class="small-btn" type="button">Add Image</button>
          <button id="save-gallery-btn" class="small-btn primary" type="button">Save Gallery</button>
        </div>
      </section>

      <section class="panel">
        <h2>Save All</h2>
        <div class="actions">
          <button id="save-all-btn" class="small-btn primary" type="button">Save All Changes</button>
        </div>
        <p id="app-status" class="status"></p>
      </section>
    </section>
  </div>

  <script src="admin.js" defer></script>
</body>
</html>
