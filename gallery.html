<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Gallery of Tudor Farm Cottages in Rohini Tea Garden, Kurseong. Click images to enlarge."
    />
    <title>Gallery | Tudor Farm Cottages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/site.css" />
  </head>
  <body data-page="gallery">
    <div class="site-shell">
      <header data-site-header></header>
      <main class="page-main">
        <section class="page-section">
          <div class="section-heading reveal">
            <p class="eyebrow" style="color: var(--forest); border-color: rgba(41, 74, 58, 0.14); background: rgba(41, 74, 58, 0.06);">Gallery</p>
            <h2>Property moments with a larger view.</h2>
            <p>Hover for depth, tap for a larger image, and keep the booking flow close at hand.</p>
          </div>
          <div id="gallery-grid" class="section-grid section-grid--gallery"></div>
        </section>
      </main>
      <footer data-site-footer></footer>
    </div>

    <a class="floating-whatsapp" data-floating-whatsapp href="#" aria-label="Chat on WhatsApp">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M19.11 17.23c-.27-.14-1.6-.79-1.85-.88-.25-.09-.43-.14-.61.14-.18.27-.7.88-.86 1.06-.16.18-.32.2-.59.07-.27-.14-1.15-.42-2.19-1.35-.81-.73-1.35-1.63-1.51-1.9-.16-.27-.02-.41.12-.54.12-.12.27-.32.41-.48.14-.16.18-.27.27-.46.09-.18.05-.34-.02-.48-.07-.14-.61-1.47-.84-2.02-.22-.53-.45-.46-.61-.47h-.52c-.18 0-.48.07-.73.34-.25.27-.95.93-.95 2.27 0 1.34.97 2.64 1.11 2.82.14.18 1.91 2.91 4.63 4.08.65.28 1.16.45 1.56.57.66.21 1.26.18 1.73.11.53-.08 1.6-.65 1.83-1.28.23-.63.23-1.17.16-1.28-.07-.11-.25-.18-.52-.32z"/>
        <path d="M26.8 5.19A15.88 15.88 0 0016 1C7.72 1 1 7.72 1 16c0 2.64.69 5.23 2 7.52L1 31l7.7-2.02A14.93 14.93 0 0016 31c8.28 0 15-6.72 15-15 0-4.01-1.56-7.78-4.2-10.81zM16 28.3c-2.24 0-4.44-.6-6.37-1.75l-.46-.27-4.57 1.2 1.22-4.45-.3-.46A12.23 12.23 0 013.7 16c0-6.78 5.52-12.3 12.3-12.3 3.28 0 6.36 1.28 8.67 3.6a12.2 12.2 0 013.63 8.7c0 6.78-5.52 12.3-12.3 12.3z"/>
      </svg>
    </a>

    <div class="modal" data-gallery-modal hidden>
      <div class="modal__dialog" role="dialog" aria-modal="true" aria-label="Gallery image preview">
        <img class="modal__media" data-gallery-modal-image src="" alt="" />
        <div class="modal__footer">
          <p class="modal__title" data-gallery-modal-title></p>
          <button class="modal-close" type="button" data-gallery-modal-close>Close</button>
        </div>
      </div>
    </div>

    <script type="module">
      import {
        createGalleryModal,
        loadSiteData,
        renderGalleryGrid,
        renderSiteChrome
      } from '/assets/site.js';

      async function init() {
        try {
          const { config, gallery } = await loadSiteData();
          document.title = `Gallery | ${config.siteTitle}`;
          renderSiteChrome({ page: 'gallery', config });
          renderGalleryGrid(document.getElementById('gallery-grid'), gallery, {
            clickable: true
          });

          const modal = createGalleryModal();
          document.getElementById('gallery-grid')?.addEventListener('click', (event) => {
            const button = event.target.closest('[data-gallery-url]');
            if (!button) return;
            modal.open({ url: button.dataset.galleryUrl, alt: button.dataset.galleryAlt });
          });
        } catch (error) {
          console.error(error);
          const galleryGrid = document.getElementById('gallery-grid');
          if (galleryGrid) galleryGrid.innerHTML = '<p class="muted-copy">Unable to load gallery right now.</p>';
        }
      }

      init();
    </script>
  </body>
</html>
